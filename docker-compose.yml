services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: tsz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d tsz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot migration step. It runs to completion before the app starts,
  # mirroring the production flow of migrating as a separate step rather than
  # on every app boot.
  migrate:
    build: .
    entrypoint: ["/bin/migrate"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://app:app@db:5432/tsz?sslmode=disable"

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://app:app@db:5432/tsz?sslmode=disable"
      JWT_SECRET: "change-me-use-a-long-random-string-in-production"
      JWT_TTL: "24h"
      # Back-office (admin realm) signing key — MUST differ from JWT_SECRET.
      ADMIN_JWT_SECRET: "change-me-a-DIFFERENT-long-random-string-for-admin"
      ADMIN_JWT_TTL: "24h"
      APP_ENV: "production"
    ports:
      - "8080:8080"

volumes:
  pgdata:
